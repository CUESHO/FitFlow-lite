<div class="form-container">
  <form (ngSubmit)="guardarMiembro()" #memberForm="ngForm" class="neon-form">
    
    <app-neon-input label="Nombre Completo:" placeholder="Ej. Juan Carlos" [(valor)]="nuevoMiembro.nombre"></app-neon-input>
    <app-neon-input label="Email:" type="email" placeholder="correo@fitflow.com" [(valor)]="nuevoMiembro.email"></app-neon-input>

    <div class="form-group">
      <label>Plan de Entrenamiento:</label>
      <select [(ngModel)]="nuevoMiembro.plan" name="plan" class="neon-input">
        <option value="Básico">Básico</option>
        <option value="Premium">Premium</option>
      </select>
    </div>

    <div class="form-group">
      <label>Estado Inicial:</label>
      <select [(ngModel)]="nuevoMiembro.estado" name="estado" class="neon-input">
        <option value="Activo">Activo</option>
        <option value="Inactivo">Inactivo</option>
      </select>
    </div>

    <div class="form-actions" style="display: flex; gap: 15px; margin-top: 20px;">
      <app-neon-button type="submit" [disabled]="!nuevoMiembro.nombre || !nuevoMiembro.email">
        {{ esEdicion ? 'Actualizar' : 'Guardar' }} Miembro
      </app-neon-button>
      
      <app-neon-button color="red" (accion)="cancelar()">
        Cancelar
      </app-neon-button>
    </div>

  </form>
</div>
